version: 0.0
os: linux
files:
  - source: /
    destination: /var/www/html/WordPress
hooks:
  InstallNode:
    - location: scripts/install_node.sh
      timeout: 300
      runas: root
  InstallMongoDB:
    - location: scripts/install_mongoDB.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/start_server.sh
    - location: scripts/create_test_db.sh
      timeout: 300
      runas: root
